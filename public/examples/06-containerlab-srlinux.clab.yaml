name: srlinux-lab
topology:
  kinds:
    nokia_srlinux:
      image: ghcr.io/nokia/srlinux:latest
  nodes:
    srl1:
      kind: nokia_srlinux
      mgmt_ipv4: 172.20.20.2
    srl2:
      kind: nokia_srlinux
      mgmt_ipv4: 172.20.20.3
    client1:
      kind: linux
      image: alpine:3
    client2:
      kind: linux
      image: alpine:3
  links:
    - endpoints: ["srl1:e1-1", "srl2:e1-1"]
    - endpoints: ["srl1:e1-2", "client1:eth1"]
    - endpoints: ["srl2:e1-2", "client2:eth1"]
